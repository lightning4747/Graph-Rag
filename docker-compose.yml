version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-frontend
      - rag-backend

  web-frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile.dev
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./web-frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      auth-db:
        condition: service_healthy

  rag-backend:
    build:
      context: ./rag-backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./rag-backend:/app
      - /app/.venv
    depends_on:
      auth-db:
        condition: service_healthy

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
