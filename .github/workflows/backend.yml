name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'rag-backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'rag-backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('rag-backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Lint Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: ruff check rag-backend/

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('rag-backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f rag-backend/requirements.txt ]; then pip install -r rag-backend/requirements.txt; fi
          pip install pytest pytest-mock

      - name: Run Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'mock-key' }}
          NEO4J_URI: ${{ secrets.NEO4J_URI || 'bolt://localhost:7687' }}
          NEO4J_USER: ${{ secrets.NEO4J_USER || 'neo4j' }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD || 'password' }}
          JWT_SHARED_SECRET: ${{ secrets.JWT_SHARED_SECRET || 'mock-jwt-secret' }}
          AUTH_DB_DSN: ${{ secrets.AUTH_DB_DSN || 'postgresql://postgres:postgres@localhost:5432/clinical_rag' }}
        run: |
          # Note: LLM calls are mocked in unit tests so they don't hit live APIs
          if [ -d rag-backend/tests ]; then pytest rag-backend/tests/ -v; else echo "No tests folder found yet."; fi
