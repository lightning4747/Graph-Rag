name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'web-frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'web-frontend/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd web-frontend
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Typecheck
        run: |
          cd web-frontend
          # Run tsc if packages are installed
          npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd web-frontend
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run Build Verification
        run: |
          cd web-frontend
          npm run build
